blueprint:
  name: Styrbar Remote Control for Lights (2026-07-14)
  description: |
    Provides integration and control for the IKEA E2001/E2002 Styrbar remote control.

    ✅ On/Off, brightness up/down, color temperature control.
    ✅ Use a fixed Temperature when starting light with arrow keys
    ✅ Configurable min/max clamps for color temp and brightness.
    ✅ Double-click On or Off to run a bonus custom action (e.g. toggle another light)
    ✅ Works with ZigbeeMQTT 2.0

    ℹ️ Version 2026-07-14
    ℹ️ Double-click detection needs one or two `input_datetime` helpers - see the
    "Double-Click Actions" section below.
  domain: automation
  input:
    light_entity:
      name: Light Entity
      description: The light or group to control.
      selector:
        entity:
          domain: light
    mqtt_device:
      name: Styrbar Remote Control
      description: The IKEA E2001/E2002 remote control.
      selector:
        device: {}
    brightness_step:
      name: Brightness Step
      description: "Brightness adjustment step (slider percentage, 1-100%)."
      default: 20
      selector:
        number:
          min: 1
          max: 100
          step: 1
          unit_of_measurement: "%"
    delay_ms:
      name: Delay (ms) Between Steps
      description: "Delay in milliseconds between brightness adjustment steps."
      default: 300
      selector:
        number:
          min: 100
          max: 2000
          step: 100
          unit_of_measurement: "ms"
    transition_seconds:
      name: Transition Time (Seconds)
      description: "The duration in seconds for the light transition effect."
      default: 1
      selector:
        number:
          min: 0.1
          max: 9999
          step: 0.1
          unit_of_measurement: "s"
    default_color_temp:
      name: Default Color Temperature (Kelvin)
      description: "Use a fixed Temperature when starting light with arrow keys"
      default: 3000
      selector:
        number:
          min: 1500
          max: 10000
          step: 100
          unit_of_measurement: "K"
    min_color_temp:
      name: Minimum Color Temperature (Kelvin)
      description: "Lowest allowed color temperature."
      default: 2000
      selector:
        number:
          min: 1500
          max: 10000
          step: 50
          unit_of_measurement: "K"
    max_color_temp:
      name: Maximum Color Temperature (Kelvin)
      description: "Highest allowed color temperature."
      default: 6500
      selector:
        number:
          min: 1500
          max: 10000
          step: 50
          unit_of_measurement: "K"
    min_brightness:
      name: Minimum Brightness (%)
      description: "Lowest allowed brightness percentage."
      default: 1
      selector:
        number:
          min: 1
          max: 100
          step: 1
          unit_of_measurement: "%"
    max_brightness:
      name: Maximum Brightness (%)
      description: "Highest allowed brightness percentage."
      default: 100
      selector:
        number:
          min: 1
          max: 100
          step: 1
          unit_of_measurement: "%"
    double_click_options:
      name: Double-Click Actions
      icon: mdi:gesture-double-tap
      collapsed: true
      input:
        double_click_window_ms:
          name: Double-Click Window (ms)
          description: >-
            Maximum time between two "On" presses (or two "Off" presses) for the
            second press to count as a double-click.
          default: 400
          selector:
            number:
              min: 200
              max: 1000
              step: 50
              unit_of_measurement: "ms"
        last_on_press_helper:
          name: On Button Double-Click Helper (optional)
          description: >-
            An `input_datetime` helper used to time double-clicks on the On button.
            Only needed if "Double-Click On Action" below is filled in. Create one
            under Settings → Devices & Services → Helpers → "Date and/or time",
            then select it here. Use a helper that is not shared with any other
            remote/blueprint instance.
          default: ""
          selector:
            entity:
              domain: input_datetime
        double_click_on_action:
          name: Double-Click "On" Action
          description: >-
            Optional. Runs in addition to turning the light on, whenever the On
            button is pressed twice quickly. For example, toggle another light.
          default: []
          selector:
            action: {}
        last_off_press_helper:
          name: Off Button Double-Click Helper (optional)
          description: >-
            An `input_datetime` helper used to time double-clicks on the Off button.
            Only needed if "Double-Click Off Action" below is filled in. Create one
            under Settings → Devices & Services → Helpers → "Date and/or time",
            then select it here. Use a helper that is not shared with any other
            remote/blueprint instance.
          default: ""
          selector:
            entity:
              domain: input_datetime
        double_click_off_action:
          name: Double-Click "Off" Action
          description: >-
            Optional. Runs in addition to turning the light off, whenever the Off
            button is pressed twice quickly. For example, toggle another light.
          default: []
          selector:
            action: {}

trigger:
  - platform: device
    device_id: !input mqtt_device
    domain: mqtt
    type: action
    subtype: "on"
    id: light_on
  - platform: device
    device_id: !input mqtt_device
    domain: mqtt
    type: action
    subtype: "off"
    id: light_off
  - platform: device
    device_id: !input mqtt_device
    domain: mqtt
    type: action
    subtype: arrow_left_click
    id: change_color_left
  - platform: device
    device_id: !input mqtt_device
    domain: mqtt
    type: action
    subtype: arrow_left_hold
    id: change_color_left_hold
  - platform: device
    device_id: !input mqtt_device
    domain: mqtt
    type: action
    subtype: arrow_left_release
    id: change_color_left_release
  - platform: device
    device_id: !input mqtt_device
    domain: mqtt
    type: action
    subtype: arrow_right_click
    id: change_color_right
  - platform: device
    device_id: !input mqtt_device
    domain: mqtt
    type: action
    subtype: arrow_right_hold
    id: change_color_right_hold
  - platform: device
    device_id: !input mqtt_device
    domain: mqtt
    type: action
    subtype: arrow_right_release
    id: change_color_right_release
  - platform: device
    device_id: !input mqtt_device
    domain: mqtt
    type: action
    subtype: brightness_move_down
    id: dim_down
  - platform: device
    device_id: !input mqtt_device
    domain: mqtt
    type: action
    subtype: brightness_move_up
    id: dim_up
  - platform: device
    device_id: !input mqtt_device
    domain: mqtt
    type: action
    subtype: brightness_stop
    id: dim_stop

variables:
  light_entity: !input light_entity
  brightness_step: !input brightness_step
  default_color_temp: !input default_color_temp
  min_color_temp: !input min_color_temp
  max_color_temp: !input max_color_temp
  min_brightness: !input min_brightness
  max_brightness: !input max_brightness
  double_click_window_ms: !input double_click_window_ms
  last_on_press_helper: !input last_on_press_helper
  last_off_press_helper: !input last_off_press_helper

action:
  - choose:
      - conditions:
          - condition: trigger
            id: light_on
        sequence:
          - service: light.turn_on
            target:
              entity_id: !input light_entity
          - if:
              - condition: template
                value_template: "{{ last_on_press_helper not in ('', none) and (as_timestamp(now()) - as_timestamp(states(last_on_press_helper), 0)) < (double_click_window_ms | float / 1000) }}"
            then: !input double_click_on_action
          - if:
              - condition: template
                value_template: "{{ last_on_press_helper not in ('', none) }}"
            then:
              - service: input_datetime.set_datetime
                target:
                  entity_id: "{{ last_on_press_helper }}"
                data:
                  timestamp: "{{ now().timestamp() }}"

      - conditions:
          - condition: trigger
            id: light_off
        sequence:
          - service: light.turn_off
            target:
              entity_id: !input light_entity
          - if:
              - condition: template
                value_template: "{{ last_off_press_helper not in ('', none) and (as_timestamp(now()) - as_timestamp(states(last_off_press_helper), 0)) < (double_click_window_ms | float / 1000) }}"
            then: !input double_click_off_action
          - if:
              - condition: template
                value_template: "{{ last_off_press_helper not in ('', none) }}"
            then:
              - service: input_datetime.set_datetime
                target:
                  entity_id: "{{ last_off_press_helper }}"
                data:
                  timestamp: "{{ now().timestamp() }}"

      - conditions:
          - condition: trigger
            id: change_color_left
        sequence:
          - service: light.turn_on
            target:
              entity_id: !input light_entity
            data:
              color_temp_kelvin: >-
                {{
                  [
                    [
                      (state_attr(light_entity, 'color_temp_kelvin') | default(default_color_temp, true) | int) - 200,
                      max_color_temp
                    ] | min,
                    min_color_temp
                  ] | max
                }}

      - conditions:
          - condition: trigger
            id: change_color_left_hold
        sequence:
          - repeat:
              sequence:
                - service: light.turn_on
                  target:
                    entity_id: !input light_entity
                  data:
                    color_temp_kelvin: >-
                      {{
                        [
                          [
                            (state_attr(light_entity, 'color_temp_kelvin') | default(default_color_temp, true) | int) - 100,
                            max_color_temp
                          ] | min,
                          min_color_temp
                        ] | max
                      }}
                - delay:
                    milliseconds: !input delay_ms
              until:
                - condition: trigger
                  id: change_color_left_release

      - conditions:
          - condition: trigger
            id: change_color_right
        sequence:
          - service: light.turn_on
            target:
              entity_id: !input light_entity
            data:
              color_temp_kelvin: >-
                {{
                  [
                    [
                      (state_attr(light_entity, 'color_temp_kelvin') | default(default_color_temp, true) | int) + 200,
                      max_color_temp
                    ] | min,
                    min_color_temp
                  ] | max
                }}

      - conditions:
          - condition: trigger
            id: change_color_right_hold
        sequence:
          - repeat:
              sequence:
                - service: light.turn_on
                  target:
                    entity_id: !input light_entity
                  data:
                    color_temp_kelvin: >-
                      {{
                        [
                          [
                            (state_attr(light_entity, 'color_temp_kelvin') | default(default_color_temp, true) | int) + 100,
                            max_color_temp
                          ] | min,
                          min_color_temp
                        ] | max
                      }}
                - delay:
                    milliseconds: !input delay_ms
              until:
                - condition: trigger
                  id: change_color_right_release

      - conditions:
          - condition: trigger
            id: dim_down
        sequence:
          - repeat:
              sequence:
                - service: light.turn_on
                  target:
                    entity_id: !input light_entity
                  data:
                    brightness_pct: >-
                      {{
                        [
                          [
                            ((state_attr(light_entity, 'brightness') | int(0)) / 2.55) | int - brightness_step,
                            max_brightness
                          ] | min,
                          min_brightness
                        ] | max
                      }}
                    transition: !input transition_seconds
                - delay:
                    milliseconds: !input delay_ms
              until:
                - condition: trigger
                  id: dim_stop

      - conditions:
          - condition: trigger
            id: dim_up
        sequence:
          - repeat:
              sequence:
                - service: light.turn_on
                  target:
                    entity_id: !input light_entity
                  data:
                    brightness_pct: >-
                      {{
                        [
                          [
                            ((state_attr(light_entity, 'brightness') | int(0)) / 2.55) | int + brightness_step,
                            max_brightness
                          ] | min,
                          min_brightness
                        ] | max
                      }}
                    transition: !input transition_seconds
                - delay:
                    milliseconds: !input delay_ms
              until:
                - condition: trigger
                  id: dim_stop

mode: restart
