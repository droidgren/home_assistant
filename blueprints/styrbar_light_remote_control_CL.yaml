blueprint:
  name: Styrbar Remote Control for Lights (2026-07-20) B
  description: |
    Provides integration and control for the IKEA E2001/E2002 Styrbar remote control.

    ✅ On/Off, brightness up/down, color temperature control.
    ✅ Use a fixed Temperature when starting light with arrow keys
    ✅ Configurable min/max clamps for color temp and brightness.
    ✅ Optional double-click actions for the On and Off buttons.
    ✅ Works with ZigbeeMQTT 2.0

    ℹ️ Double-click note: when a double-click action is configured for a button,
    single presses of that button are delayed by the double-click window so the
    two can be told apart. Leave a double-click action empty and that button
    reacts instantly, exactly as before. Pressing any other button on the remote
    within the window cancels a pending single press.

    ℹ️ Version 2026-07-19
  domain: automation
  input:
    light_entity:
      name: Light Entity
      description: The light or group to control.
      selector:
        entity:
          domain: light
    mqtt_device:
      name: Styrbar Remote Control
      description: The IKEA E2001/E2002 remote control.
      selector:
        device: {}
    brightness_step:
      name: Brightness Step
      description: "Brightness adjustment step (slider percentage, 1-100%)."
      default: 20
      selector:
        number:
          min: 1
          max: 100
          step: 1
          unit_of_measurement: "%"
    delay_ms:
      name: Delay (ms) Between Steps
      description: "Delay in milliseconds between brightness adjustment steps."
      default: 300
      selector:
        number:
          min: 100
          max: 2000
          step: 100
          unit_of_measurement: "ms"
    transition_seconds:
      name: Transition Time (Seconds)
      description: "The duration in seconds for the light transition effect."
      default: 1
      selector:
        number:
          min: 0.1
          max: 9999
          step: 0.1
          unit_of_measurement: "s"
    default_color_temp:
      name: Default Color Temperature (Kelvin)
      description: "Use a fixed Temperature when starting light with arrow keys"
      default: 3000
      selector:
        number:
          min: 1500
          max: 10000
          step: 100
          unit_of_measurement: "K"
    min_color_temp:
      name: Minimum Color Temperature (Kelvin)
      description: "Lowest allowed color temperature."
      default: 2000
      selector:
        number:
          min: 1500
          max: 10000
          step: 50
          unit_of_measurement: "K"
    max_color_temp:
      name: Maximum Color Temperature (Kelvin)
      description: "Highest allowed color temperature."
      default: 6500
      selector:
        number:
          min: 1500
          max: 10000
          step: 50
          unit_of_measurement: "K"
    min_brightness:
      name: Minimum Brightness (%)
      description: "Lowest allowed brightness percentage."
      default: 1
      selector:
        number:
          min: 1
          max: 100
          step: 1
          unit_of_measurement: "%"
    max_brightness:
      name: Maximum Brightness (%)
      description: "Highest allowed brightness percentage."
      default: 100
      selector:
        number:
          min: 1
          max: 100
          step: 1
          unit_of_measurement: "%"
    double_click_section:
      name: Double-Click Actions (Optional)
      icon: mdi:gesture-double-tap
      collapsed: true
      input:
        double_click_window_ms:
          name: Double-Click Window
          description: >-
            Maximum time between two presses to count as a double-click. This is
            also the delay added to single presses on buttons that have a
            double-click action configured.
          default: 400
          selector:
            number:
              min: 150
              max: 1000
              step: 50
              unit_of_measurement: "ms"
        double_click_on_action:
          name: On Button Double-Click Action
          description: >-
            Actions to run when the On button is pressed twice within the
            double-click window, e.g. toggling another light. Leave empty to
            disable double-click detection for the On button (single presses
            stay instant).
          default: []
          selector:
            action: {}
        double_click_off_action:
          name: Off Button Double-Click Action
          description: >-
            Actions to run when the Off button is pressed twice within the
            double-click window. Leave empty to disable double-click detection
            for the Off button (single presses stay instant).
          default: []
          selector:
            action: {}

trigger:
  - platform: device
    device_id: !input mqtt_device
    domain: mqtt
    type: action
    subtype: "on"
    id: light_on
  - platform: device
    device_id: !input mqtt_device
    domain: mqtt
    type: action
    subtype: "off"
    id: light_off
  - platform: device
    device_id: !input mqtt_device
    domain: mqtt
    type: action
    subtype: arrow_left_click
    id: change_color_left
  - platform: device
    device_id: !input mqtt_device
    domain: mqtt
    type: action
    subtype: arrow_left_hold
    id: change_color_left_hold
  - platform: device
    device_id: !input mqtt_device
    domain: mqtt
    type: action
    subtype: arrow_left_release
    id: change_color_left_release
  - platform: device
    device_id: !input mqtt_device
    domain: mqtt
    type: action
    subtype: arrow_right_click
    id: change_color_right
  - platform: device
    device_id: !input mqtt_device
    domain: mqtt
    type: action
    subtype: arrow_right_hold
    id: change_color_right_hold
  - platform: device
    device_id: !input mqtt_device
    domain: mqtt
    type: action
    subtype: arrow_right_release
    id: change_color_right_release
  - platform: device
    device_id: !input mqtt_device
    domain: mqtt
    type: action
    subtype: brightness_move_down
    id: dim_down
  - platform: device
    device_id: !input mqtt_device
    domain: mqtt
    type: action
    subtype: brightness_move_up
    id: dim_up
  - platform: device
    device_id: !input mqtt_device
    domain: mqtt
    type: action
    subtype: brightness_stop
    id: dim_stop

variables:
  light_entity: !input light_entity
  brightness_step: !input brightness_step
  default_color_temp: !input default_color_temp
  min_color_temp: !input min_color_temp
  max_color_temp: !input max_color_temp
  min_brightness: !input min_brightness
  max_brightness: !input max_brightness
  double_click_window_ms: !input double_click_window_ms
  double_click_on_action: !input double_click_on_action
  double_click_off_action: !input double_click_off_action

action:
  - choose:
      - conditions:
          - condition: trigger
            id: light_on
        sequence:
          - if: "{{ double_click_on_action | length > 0 }}"
            then:
              # Double-click detection enabled: decide if this press is the
              # second one of a pair. `this.attributes.last_triggered` still
              # holds the PREVIOUS trigger time at this point, and mode:restart
              # means a second press kills the pending single-press run below.
              - if: >-
                  {{ (as_timestamp(now()) -
                      as_timestamp(this.attributes.last_triggered, default=0)) * 1000
                     < double_click_window_ms }}
                then: !input double_click_on_action
                else:
                  # First press: wait out the window. If a second press arrives,
                  # this run is restarted and the turn_on below never fires.
                  - delay:
                      milliseconds: !input double_click_window_ms
                  - service: light.turn_on
                    target:
                      entity_id: !input light_entity
            else:
              - service: light.turn_on
                target:
                  entity_id: !input light_entity

      - conditions:
          - condition: trigger
            id: light_off
        sequence:
          - if: "{{ double_click_off_action | length > 0 }}"
            then:
              - if: >-
                  {{ (as_timestamp(now()) -
                      as_timestamp(this.attributes.last_triggered, default=0)) * 1000
                     < double_click_window_ms }}
                then: !input double_click_off_action
                else:
                  - delay:
                      milliseconds: !input double_click_window_ms
                  - service: light.turn_off
                    target:
                      entity_id: !input light_entity
            else:
              - service: light.turn_off
                target:
                  entity_id: !input light_entity

      - conditions:
          - condition: trigger
            id: change_color_left
        sequence:
          - service: light.turn_on
            target:
              entity_id: !input light_entity
            data:
              color_temp_kelvin: >-
                {{
                  [
                    [
                      (state_attr(light_entity, 'color_temp_kelvin') | default(default_color_temp, true) | int) - 200,
                      max_color_temp
                    ] | min,
                    min_color_temp
                  ] | max
                }}

      - conditions:
          - condition: trigger
            id: change_color_left_hold
        sequence:
          - repeat:
              sequence:
                - service: light.turn_on
                  target:
                    entity_id: !input light_entity
                  data:
                    color_temp_kelvin: >-
                      {{
                        [
                          [
                            (state_attr(light_entity, 'color_temp_kelvin') | default(default_color_temp, true) | int) - 100,
                            max_color_temp
                          ] | min,
                          min_color_temp
                        ] | max
                      }}
                - delay:
                    milliseconds: !input delay_ms
              until:
                - condition: trigger
                  id: change_color_left_release

      - conditions:
          - condition: trigger
            id: change_color_right
        sequence:
          - service: light.turn_on
            target:
              entity_id: !input light_entity
            data:
              color_temp_kelvin: >-
                {{
                  [
                    [
                      (state_attr(light_entity, 'color_temp_kelvin') | default(default_color_temp, true) | int) + 200,
                      max_color_temp
                    ] | min,
                    min_color_temp
                  ] | max
                }}

      - conditions:
          - condition: trigger
            id: change_color_right_hold
        sequence:
          - repeat:
              sequence:
                - service: light.turn_on
                  target:
                    entity_id: !input light_entity
                  data:
                    color_temp_kelvin: >-
                      {{
                        [
                          [
                            (state_attr(light_entity, 'color_temp_kelvin') | default(default_color_temp, true) | int) + 100,
                            max_color_temp
                          ] | min,
                          min_color_temp
                        ] | max
                      }}
                - delay:
                    milliseconds: !input delay_ms
              until:
                - condition: trigger
                  id: change_color_right_release

      - conditions:
          - condition: trigger
            id: dim_down
        sequence:
          - repeat:
              sequence:
                - service: light.turn_on
                  target:
                    entity_id: !input light_entity
                  data:
                    brightness_pct: >-
                      {{
                        [
                          [
                            ((state_attr(light_entity, 'brightness') | int(0)) / 2.55) | int - brightness_step,
                            max_brightness
                          ] | min,
                          min_brightness
                        ] | max
                      }}
                    transition: !input transition_seconds
                - delay:
                    milliseconds: !input delay_ms
              until:
                - condition: trigger
                  id: dim_stop

      - conditions:
          - condition: trigger
            id: dim_up
        sequence:
          - repeat:
              sequence:
                - service: light.turn_on
                  target:
                    entity_id: !input light_entity
                  data:
                    brightness_pct: >-
                      {{
                        [
                          [
                            ((state_attr(light_entity, 'brightness') | int(0)) / 2.55) | int + brightness_step,
                            max_brightness
                          ] | min,
                          min_brightness
                        ] | max
                      }}
                    transition: !input transition_seconds
                - delay:
                    milliseconds: !input delay_ms
              until:
                - condition: trigger
                  id: dim_stop

mode: restart
